name: Build Capacitor APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://114.215.177.52:8000
          VITE_VISION_API_BASE_URL: http://114.215.177.52:8000
          VITE_PAYMENT_API_BASE_URL: http://114.215.177.52:8000

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Enable cleartext traffic for HTTP API
        run: |
          python - <<'PY'
          from pathlib import Path
          manifest_path = Path("android/app/src/main/AndroidManifest.xml")
          if manifest_path.exists():
              text = manifest_path.read_text(encoding="utf-8")
              if 'android:usesCleartextTraffic=' not in text:
                  text = text.replace(
                      "<application",
                      '<application android:usesCleartextTraffic="true"',
                      1,
                  )
                  manifest_path.write_text(text, encoding="utf-8")
          PY

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartLampAssistant-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
