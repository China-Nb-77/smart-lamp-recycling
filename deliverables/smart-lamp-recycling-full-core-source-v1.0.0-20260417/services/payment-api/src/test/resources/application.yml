spring:
  datasource:
    url: jdbc:h2:mem:pay_demo_patch;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
app:
  public-access:
    access-domain: http://localhost:8080
